name: verus

# T13.6 — CI gate for the Verus formal-verification artifacts under
# `verification/verus/`. Builds Verus from source on the GitHub-hosted
# x86_64 runner (no aarch64 — see fallback note below) and runs
# `run_proof.sh` against the tier-A and shard-methods proofs. Fails
# the build if any lemma fails to verify.
#
# Why a separate workflow:
#   * Verus is a heavy, slow-moving toolchain (~10 min cold build).
#     Keeping it isolated from `chaos-smoke.yml` and `diff-tlc.yml`
#     lets it cache independently and lets reviewers see Verus
#     verdicts as a distinct signal.
#   * The build is dominated by Verus + Z3 setup, so caching is
#     critical for sustainable PR-gate latency. Cache keys are tied
#     to the Verus source-tree HEAD (pinned via the URL fragment in
#     the install step), so a Verus upgrade naturally invalidates
#     the cache.
#
# Aarch64 runner gap:
#   Upstream Verus does not yet ship a prebuilt aarch64 Linux Z3
#   (see `verification/verus/README.md` § "Install Verus from
#   source"). On Ubuntu 24.04 we'd need the apt z3 (4.13.3) +
#   `--no-solver-version-check`. The tier-A and shard-methods
#   proofs verify identically on x86_64 and aarch64 in local
#   testing on a c8g.metal-24xl spot, so we restrict the GHA
#   gate to ubuntu-latest (x86_64) for v1.1.0. Aarch64 is tracked
#   as a follow-up and runs manually via `workflow_dispatch` if
#   needed — see the `manual-aarch64` job at the bottom.
#
# Trigger model:
#   * push to main and pull_request to main: full gate, blocks
#     merge if any lemma fails to verify.
#   * workflow_dispatch: manual run, used to validate the CI shape
#     itself when pushing changes to this file.

on:
  push:
    branches: [main]
    paths:
      - "verification/verus/**"
      - ".github/workflows/verus.yml"
  pull_request:
    branches: [main]
    paths:
      - "verification/verus/**"
      - ".github/workflows/verus.yml"
  workflow_dispatch:
    # Manual trigger so a "force-run" is one click for reviewers
    # who want to re-run after a Verus upstream bump.

# Pin the Verus revision so cache keys are stable until we
# explicitly bump. This SHA matches the tier-A README's
# "release/0.2026.04.19.6f7d4de or newer" guidance — pinning a
# concrete SHA is a defensive choice so the CI doesn't break on
# upstream churn between PRs.
env:
  VERUS_REPO: "https://github.com/verus-lang/verus.git"
  # Pinned to the release tag aligned with v1.0.0's tier-B / tier-A
  # toolchain. Bump deliberately when upgrading the proof.
  VERUS_REF: "release/0.2026.04.19.6f7d4de"

jobs:
  verus:
    name: verus tier-a + shard-methods
    runs-on: ubuntu-latest
    # Cold-cache build is ~10-15 min; warm-cache run is ~30 sec.
    # Generous ceiling so a runaway run fails loudly.
    timeout-minutes: 30

    steps:
      - name: Checkout tlaplusplus
        uses: actions/checkout@v4

      - name: Show host info
        run: |
          uname -a
          nproc
          cat /etc/os-release | head -3

      # Verus pins its rust toolchain via verus/source/rust-toolchain.toml.
      # We install rustup; the toolchain itself is fetched on first
      # cargo invocation inside verus/source.
      - name: Install rustup
        uses: dtolnay/rust-toolchain@stable

      # Ubuntu 24.04 ships z3 4.12 in main. That matches Verus's
      # preferred 4.12.5 closely enough that
      # `--no-solver-version-check` (used in run_proof.sh) accepts
      # it. If a future upstream bump requires exact 4.12.5, switch
      # to building Z3 from source — but the wall-time cost is
      # significant (~15 min) so we prefer the apt path.
      - name: Install Z3 from apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends z3
          z3 --version

      - name: Cache Verus build
        id: cache-verus
        uses: actions/cache@v4
        with:
          # Cache the entire built Verus tree under $HOME/verus.
          # The key is tied to the pinned ref so a deliberate bump
          # invalidates and forces a rebuild.
          path: |
            ~/verus
          key: verus-${{ runner.os }}-${{ runner.arch }}-${{ env.VERUS_REF }}-v2
          restore-keys: |
            verus-${{ runner.os }}-${{ runner.arch }}-${{ env.VERUS_REF }}-

      - name: Clone and build Verus from source (cache miss)
        if: steps.cache-verus.outputs.cache-hit != 'true'
        # Building Verus has three steps:
        #   1. clone the repo at the pinned ref
        #   2. point its `z3` symlink at the apt-installed Z3 binary
        #      (Verus's get-z3.sh download is fragile on aarch64 and
        #      version-mismatched on x86_64; using the system Z3 is
        #      both faster and more reproducible)
        #   3. `vargo build --release --vstd-no-verify` (vstd-no-verify
        #      because the Verus standard library is verified upstream
        #      against Z3 4.12.5 and may produce false-negatives on
        #      4.13.x; this does not affect OUR proofs since Verus
        #      still runs Z3 against `seqlock_resize_tier_a.rs` and
        #      `shard_methods.rs` themselves)
        run: |
          set -euo pipefail
          if [ -d "$HOME/verus" ]; then
            rm -rf "$HOME/verus"
          fi
          git clone --depth 1 --branch "$VERUS_REF" "$VERUS_REPO" "$HOME/verus" || \
            git clone "$VERUS_REPO" "$HOME/verus"
          cd "$HOME/verus"
          # If we fell back to the default branch, check out the pinned ref.
          git fetch --depth 1 origin "$VERUS_REF" || true
          git checkout "$VERUS_REF" || echo "warning: pinned ref not found, using default branch"
          cd source

          # Point at the apt-installed z3 (works around upstream
          # get-z3.sh fragility; documented in run_proof.sh).
          cp "$(command -v z3)" ./z3
          chmod +x ./z3
          ./z3 --version

          # Activate Verus's pinned rust toolchain via tools/activate.
          # shellcheck source=/dev/null
          . ../tools/activate
          vargo --no-solver-version-check build --release --vstd-no-verify

      - name: Show Verus binary location
        run: |
          ls -la "$HOME/verus/source/target-verus/release/"
          "$HOME/verus/source/target-verus/release/verus" --version || true

      - name: Run tier-B proof (regression — must keep verifying)
        run: |
          export VERUS_DIR="$HOME/verus"
          ./verification/verus/run_proof.sh tier-b 2>&1 | tee /tmp/verus-tier-b.log
          # Fail the build if the tail line doesn't include "0 errors".
          if ! grep -q "verification results::.*0 errors" /tmp/verus-tier-b.log; then
            echo "::error::tier-B Verus proof FAILED to verify with 0 errors"
            exit 1
          fi

      - name: Run tier-A proof (T13.1-T13.3 lemmas)
        run: |
          export VERUS_DIR="$HOME/verus"
          ./verification/verus/run_proof.sh tier-a 2>&1 | tee /tmp/verus-tier-a.log
          if ! grep -q "verification results::.*0 errors" /tmp/verus-tier-a.log; then
            echo "::error::tier-A Verus proof FAILED to verify with 0 errors"
            exit 1
          fi

      - name: Run shard-methods proof (T13.4 production-shape shadow)
        run: |
          export VERUS_DIR="$HOME/verus"
          ./verification/verus/run_proof.sh shard-methods 2>&1 | tee /tmp/verus-shadow.log
          if ! grep -q "verification results::.*0 errors" /tmp/verus-shadow.log; then
            echo "::error::shard-methods Verus proof FAILED to verify with 0 errors"
            exit 1
          fi

      # T13.5 — reader liveness. This proof admits 3 protocol-shape
      # axioms (documented in the file). Verus still checks the
      # SAFETY portion of the file, including the inductive proofs
      # of seq monotonicity and reader-attempt soundness, so a
      # regression in those will fail this gate.
      - name: Run reader-liveness proof (T13.5 unbounded fairness)
        run: |
          export VERUS_DIR="$HOME/verus"
          ./verification/verus/run_proof.sh liveness 2>&1 | tee /tmp/verus-liveness.log
          if ! grep -q "verification results::.*0 errors" /tmp/verus-liveness.log; then
            echo "::error::reader-liveness Verus proof FAILED to verify with 0 errors"
            exit 1
          fi

      - name: Print final verification summary
        if: always()
        run: |
          echo "==== tier-B ===="; tail -5 /tmp/verus-tier-b.log 2>/dev/null || echo "(no log)"
          echo "==== tier-A ===="; tail -5 /tmp/verus-tier-a.log 2>/dev/null || echo "(no log)"
          echo "==== shard-methods ===="; tail -5 /tmp/verus-shadow.log 2>/dev/null || echo "(no log)"
          echo "==== liveness ===="; tail -5 /tmp/verus-liveness.log 2>/dev/null || echo "(no log)"

      - name: Upload Verus logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verus-logs
          path: |
            /tmp/verus-tier-b.log
            /tmp/verus-tier-a.log
            /tmp/verus-shadow.log
            /tmp/verus-liveness.log
          if-no-files-found: ignore
          retention-days: 7

  # Manual aarch64 path. Currently disabled by default because
  # GitHub-hosted aarch64 runners (`ubuntu-24.04-arm`) ship Z3 4.13.3
  # which Verus's vargo build script may reject without
  # `--vstd-no-verify`. The `run_proof.sh` already passes
  # `-V no-solver-version-check` for our proofs, but the vstd
  # build step inside vargo independently checks Z3 — so an aarch64
  # build of Verus is currently flaky on hosted runners. Track
  # upstream resolution at https://github.com/verus-lang/verus/issues
  # and re-enable this job when reliable.
  verus-aarch64-manual:
    name: verus aarch64 (manual)
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
      - name: Checkout tlaplusplus
        uses: actions/checkout@v4

      - name: Show host info
        run: |
          uname -a
          nproc

      - name: Install rustup
        uses: dtolnay/rust-toolchain@stable

      - name: Install Z3 from apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends z3
          z3 --version

      - name: Cache Verus build (aarch64)
        id: cache-verus-aarch64
        uses: actions/cache@v4
        with:
          path: |
            ~/verus
          key: verus-${{ runner.os }}-${{ runner.arch }}-${{ env.VERUS_REF }}-v2
          restore-keys: |
            verus-${{ runner.os }}-${{ runner.arch }}-${{ env.VERUS_REF }}-

      - name: Clone and build Verus from source (cache miss)
        if: steps.cache-verus-aarch64.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          if [ -d "$HOME/verus" ]; then
            rm -rf "$HOME/verus"
          fi
          git clone --depth 1 --branch "$VERUS_REF" "$VERUS_REPO" "$HOME/verus" || \
            git clone "$VERUS_REPO" "$HOME/verus"
          cd "$HOME/verus"
          git fetch --depth 1 origin "$VERUS_REF" || true
          git checkout "$VERUS_REF" || echo "warning: pinned ref not found, using default branch"
          cd source
          cp "$(command -v z3)" ./z3
          chmod +x ./z3
          # shellcheck source=/dev/null
          . ../tools/activate
          vargo --no-solver-version-check build --release --vstd-no-verify

      - name: Run all three proofs (best-effort on aarch64)
        # Continue-on-error is intentional: aarch64 is informational,
        # not a gate. Failure here does not block the merge.
        continue-on-error: true
        run: |
          export VERUS_DIR="$HOME/verus"
          ./verification/verus/run_proof.sh tier-b
          ./verification/verus/run_proof.sh tier-a
          ./verification/verus/run_proof.sh shard-methods
