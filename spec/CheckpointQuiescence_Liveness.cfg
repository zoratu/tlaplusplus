\* Configuration for liveness checking.
\* Uses LiveSpec which includes fairness assumptions.
\*
\* Expected: QuiescenceEventuallyAchieved should FAIL - demonstrating the
\* bug where quiescence cannot be achieved due to deadlock.

\* Constants - small values for tractable liveness checking
CONSTANTS
    Workers = {w1, w2}
    MaxSteps = 12

\* Symmetry optimization
SYMMETRY Symmetry

\* State constraint to bound exploration
CONSTRAINT StateConstraint

\* Use specification with fairness for liveness checking
SPECIFICATION LiveSpec

\* Type invariant
INVARIANT TypeOK

\* Safety invariants
INVARIANT NoDrainWhileActive
INVARIANT PausedSetConsistent
INVARIANT WriteLockConsistent
INVARIANT BlockedNotHoldingLock

\* Liveness properties - these demonstrate the bug through temporal logic
\* QuiescenceEventuallyAchieved should FAIL - showing the deadlock
PROPERTY QuiescenceEventuallyAchieved

\* Additional liveness (optional - comment out for faster runs)
\* PROPERTY WorkersEventuallyResume
\* PROPERTY FPSwitchEventuallyCompletes
\* PROPERTY CheckpointEventuallyCompletes
