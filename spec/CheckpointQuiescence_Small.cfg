\* Configuration for small model checking runs.
\* Tests the checkpoint quiescence coordination with FP store mode switching.
\*
\* Expected: NoDeadlock should FAIL - demonstrating the bug where workers
\* blocked on FP lock cannot reach pause point.

\* Constants - small values for quick exploration
CONSTANTS
    Workers = {w1, w2}
    MaxSteps = 15

\* State constraint to bound exploration
CONSTRAINT StateConstraint

\* Specification
SPECIFICATION Spec

\* Type invariant (should always hold)
INVARIANT TypeOK

\* Safety invariants (should always hold)
INVARIANT NoDrainWhileActive
INVARIANT PausedSetConsistent
INVARIANT WriteLockConsistent
INVARIANT BlockedNotHoldingLock

\* Bug detection invariant - this should FAIL to demonstrate the bug
\* Comment out to allow full state space exploration
INVARIANT NoDeadlock

\* Alternative bug detection
\* INVARIANT ProgressPossible

\* Liveness properties - require fairness (use LiveSpec)
\* Uncomment to check liveness (slower, requires fairness)
\* PROPERTY QuiescenceEventuallyAchieved
\* PROPERTY WorkersEventuallyResume
\* PROPERTY FPSwitchEventuallyCompletes
\* PROPERTY CheckpointEventuallyCompletes
